# Arb-Only CEX-DEX Risk Limits
#
# If config/risk-limits.yaml is absent, the project uses these defaults.
# User-facing messaging should say "using project defaults", not "misconfigured".

global:
  default_mode: "demo"
  data_staleness_analysis_sec: 60
  data_staleness_arb_sec: 5
  max_position_size_usd: 2000
  max_total_exposure_usd: 5000
  max_concurrent_positions: 3
  min_liquidity_usd: 100000
  max_price_impact_pct: 1.0
  max_loss_per_trade_usd: 50
  max_transfer_latency_min: 10

cex_dex_arbitrage:
  min_spread_bps: 50
  min_net_profit_usd: 5
  min_profit_to_cost_ratio: 1.5
  max_signal_age_sec: 5
  rebalance_window_min: 60
  max_transfer_latency_min: 10
  max_hedge_hold_min: 30
  max_worst_case_loss_usd: 25
  warn_gas_share_of_gross_pct: 10
  block_gas_share_of_gross_pct: 30

execution_profile_defaults:
  framework: "auto"
  cex_base_ready: false
  cex_quote_ready: false
  dex_base_ready: false
  dex_quote_ready: false
  hedge_enabled: false
  max_transfer_latency_min: 10

security:
  native_tokens_skip_contract_checks: true
  allow_unchecked_non_native: true
  unchecked_can_be_ready_now: false
  block_buy_tax_above_pct: 5
  block_sell_tax_above_pct: 10
  block_holder_concentration_above_pct: 80
  warn_holder_concentration_above_pct: 50
  block_unverified_contracts: true

non_atomic_risk:
  warn_partial_fill_loss_usd: 10
  block_worst_case_loss_usd: 25
  warn_latency_window_sec: 60
  block_latency_window_sec: 180

mev:
  evm_default_route: "compare"
  solana_route: "not_applicable"
  warn_sandwich_risk: "medium"
  block_public_route_above_risk: "high"
